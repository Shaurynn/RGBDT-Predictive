# ==========================================
# TMLPN Experiment Configuration
# ==========================================

dataset:
  name: "MM5"
  image_height: 480
  image_width: 640
  # Note: Metric caps (depth/thermal) are strictly handled via dataset metadata.json

phase1_pretraining:
  backbone: "mit_b3"
  batch_size: 8
  epochs: 100
  optimizer:
    lr: 1.0e-4
    weight_decay: 0.04
  jepa:
    mask_ratio: 0.60
    tau_base: 0.996

phase2_downstream:
  backbone: "mit_b3"
  teacher_backbone: "mit_b4"
  batch_size: 6
  kd_temperature: 4.0
  hpo:
    n_trials: 30
    lr_min: 1.0e-5
    lr_max: 5.0e-3
    wd_min: 1.0e-4
    wd_max: 1.0e-1
  epochs:
    baseline: 30
    hero: 300
    microtune: 200
    default: 200
  learning_rates:
    default: 1.0e-4
    microtune: 1.0e-5

ablations:
  enable_modality_isolation: true    # Set to false to force naive 5-channel early fusion
  variance_type: "spatial"           # Options: "spatial", "batch", "none"
  gdl_type: "global_anchored"        # Options: "global_anchored", "batch_dynamic", "none"
  enable_kd: true                    # Set to false to bypass the teacher network routing